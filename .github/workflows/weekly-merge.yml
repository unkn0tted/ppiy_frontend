name: Weekly Merge develop → main

on:
  schedule:
    - cron: '0 2 * * 1' # Every Monday 02:00 UTC
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "web-ppanel"
          git config user.email "web@ppanel.dev"

      - name: Sync main into develop first
        run: |
          git checkout develop
          git pull origin develop
          git merge origin/main --no-edit -X theirs
          git push origin develop

      - name: Merge develop into main
        run: |
          git checkout main
          git pull origin main
          git merge origin/develop --no-edit -X theirs
          git push origin main
